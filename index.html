<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DHL - Carnet entreprises</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">DHL</p>
            <h1>Carnet entreprises</h1>
          </div>
        </div>

        <div class="top-actions">
          <label class="search-box">
            <span>Recherche</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Nom d'entreprise">
          </label>
          <button id="printButton" class="print-button" type="button">Imprimer recap</button>
        </div>
      </header>

      <section class="route-panel" aria-label="Zones NPX">
        <div id="tabs" class="tabs" role="tablist" aria-label="Onglets de tournee"></div>
      </section>

      <section class="workspace" aria-labelledby="activeRouteTitle">
        <div class="workspace-head">
          <div>
            <p class="eyebrow">Onglet actif</p>
            <h2 id="activeRouteTitle">NPXA</h2>
          </div>
          <p id="companyCount" class="count-pill">0 entreprises</p>
        </div>

        <form id="addCompanyForm" class="add-form">
          <label>
            <span>Nom</span>
            <input id="companyName" type="text" autocomplete="off" placeholder="Entreprise">
          </label>
          <button class="primary-button" type="submit">Ajouter</button>
        </form>

        <div id="companyList" class="company-list" aria-live="polite"></div>
      </section>
    </main>

    <section id="printArea" class="print-area" aria-hidden="true"></section>

    <script src="app.js" defer></script>
  </body>
</html>
