<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DHL - Carnet entreprises</title>
    <link rel="stylesheet" href="styles.css?v=20260710-pdf-1">
  </head>
  <body data-theme="light">
    <section id="agencyGate" hidden></section>

    <main id="appShell" class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo" aria-hidden="true">DHL</div>
          <div>
            <p class="sidebar-kicker"><span class="agency-status-dot" aria-hidden="true"></span>Carnet</p>
            <h2 id="currentAgencyName">Entreprises</h2>
          </div>
        </div>

        <div class="routes-heading">
          <span>Tournees</span>
          <button id="toggleRouteForm" class="icon-button" type="button" title="Ajouter une tournee" aria-label="Ajouter une tournee">+</button>
        </div>

        <form id="addRouteForm" class="route-form" hidden>
          <input id="routeNameInput" type="text" maxlength="30" autocomplete="off" placeholder="Ex: NPXA" aria-label="Numero de tournee">
          <button class="route-add-button" type="submit">Ajouter</button>
        </form>

        <nav id="tabs" class="sidebar-routes" aria-label="Tournees"></nav>

        <div class="sidebar-footer" hidden></div>
      </aside>

      <section class="main-area">
        <header class="topbar">
          <div class="main-heading">
            <p class="eyebrow">Carnet de livraison</p>
            <h1 id="activeRouteTitle">Aucune tournee</h1>
          </div>

          <div class="top-actions">
            <label class="search-box">
              <span>Recherche</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="Nom d'entreprise">
            </label>
            <button id="printButton" class="print-button" type="button">Imprimer recap</button>
            <button id="pdfButton" class="pdf-button" type="button">Enregistrer PDF</button>
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Changer le mode">
              <span data-theme-icon aria-hidden="true">&#9728;</span>
            </button>
          </div>
        </header>

        <section class="stats-grid" aria-label="Statistiques de la tournee">
          <article class="stat-card stat-total">
            <span class="stat-icon" aria-hidden="true">&#9638;</span>
            <div>
              <strong id="companyCount">0</strong>
              <span id="companyCountLabel">Entreprises</span>
            </div>
          </article>
          <article class="stat-card stat-open">
            <span class="stat-icon" aria-hidden="true">&#9679;</span>
            <div>
              <strong id="openCompanyCount">0</strong>
              <span>Ouvertes</span>
            </div>
          </article>
          <article class="stat-card stat-closed">
            <span class="stat-icon" aria-hidden="true">&#9679;</span>
            <div>
              <strong id="closedCompanyCount">0</strong>
              <span>Fermees</span>
            </div>
          </article>
          <article class="stat-card stat-updated">
            <span class="stat-icon" aria-hidden="true">&#8635;</span>
            <div>
              <strong id="modifiedCompanyCount">0</strong>
              <span>Modifiees aujourd'hui</span>
            </div>
          </article>
        </section>

        <section class="workspace" aria-labelledby="activeRouteTitle">
          <form id="addCompanyForm" class="add-form">
            <label>
              <span>Nom de l'entreprise</span>
              <input id="companyName" type="text" autocomplete="off" placeholder="Entreprise">
            </label>
            <button class="primary-button" type="submit"><span aria-hidden="true">+</span><span>Ajouter</span></button>
          </form>

          <div id="companyList" class="company-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <section id="printArea" class="print-area" aria-hidden="true"></section>
    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="app.js?v=20260710-pdf-1" defer></script>
  </body>
</html>
